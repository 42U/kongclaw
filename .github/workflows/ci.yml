name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run --exclude='**/surreal.test.ts' --exclude='**/skills.test.ts' --exclude='**/subagent.test.ts' --exclude='**/memory-substrate.test.ts' --exclude='**/reflection.test.ts'
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Check for console.log in source (not tests/bench)
        run: |
          if grep -rn "console\.log" src/ --include="*.ts" | grep -v "// ok" | grep -v "console\.log(" | head -5; then
            echo "::warning::Found console.log in source files (use console.error for debug output)"
          fi

      - name: Verify no secrets in tracked files
        run: |
          if grep -rn "sk-ant-[a-zA-Z0-9]\{20,\}" src/ tests/ --include="*.ts" --include="*.json" | head -5; then
            echo "::error::Possible real API key in source files"
            exit 1
          fi
