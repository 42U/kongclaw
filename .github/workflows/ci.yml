name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests (integration tests require SurrealDB + native modules)
        run: |
          npx vitest run \
            tests/acan.test.ts tests/cli.test.ts tests/errors.test.ts \
            tests/eval.test.ts tests/graph-context.test.ts tests/health-check.test.ts \
            tests/identity.test.ts tests/orchestrator.test.ts tests/prefetch.test.ts \
            tests/retrieval-quality.test.ts tests/subagent-worker.test.ts \
            tests/supersedes.test.ts tests/tools.test.ts tests/tools/introspect.test.ts

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Check for console.log in source (not tests/bench)
        run: |
          if grep -rn "console\.log" src/ --include="*.ts" | grep -v "// ok" | grep -v "console\.log(" | head -5; then
            echo "::warning::Found console.log in source files (use console.error for debug output)"
          fi

      - name: Verify no secrets in tracked files
        run: |
          FOUND=$(grep -rn "sk-ant-api\|sk-ant-oat01-[A-Za-z]" src/ tests/ --include="*.ts" --include="*.json" || true)
          if [ -n "$FOUND" ]; then
            echo "$FOUND"
            echo "::error::Possible real API key in source files"
            exit 1
          fi
